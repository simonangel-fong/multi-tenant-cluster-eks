apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: {{ .Values.name }}
  namespace: argocd
spec:
  description: Tenant AppProject for {{ .Values.name }}
  sourceRepos:
    - https://github.com/simonangel-fong/eks-multi-tenant-cluster
    - {{ .Values.sourceRepo | quote }}
  destinations:
    - server: https://kubernetes.default.svc
      namespace: {{ .Values.name }}
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  clusterResourceWhitelist: []
