apiVersion: v1
kind: Namespace
metadata:
  name: team-a
  labels:
    team: team-a
    # Ambient + Waypoint experiment reverted — kubelet HTTP probes still fail
    # against ambient-enrolled pods even with a namespace-attached Waypoint on
    # Istio 1.30. See "Ambient experiment" in docs/security.md.
    # istio.io/dataplane-mode: ambient
    # istio.io/use-waypoint: waypoint
---
# Default-deny — every pod-to-pod path is blocked until an allow rule opens it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: team-a
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# Companion allow — restores inbound from the shared Gateway and outbound to
# kube-dns. Without this, default-deny breaks tenant ingress on day one.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-ingress-and-dns
  namespace: team-a
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-ingress
    # Kubelet probes originate from the node's host IP, which has no
    # namespace/pod selector. Allow the VPC CIDR so probes reach the pod.
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    - to:
        - podSelector: {}
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: baseline
  namespace: team-a
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: baseline
  namespace: team-a
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: team-a
  namespace: argocd
  labels:
    scope: tenant
    team: team-a
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: team-a
  source:
    repoURL: https://github.com/simonangel-fong/project-eks-argocd
    targetRevision: master
    path: demo-app/team-a
  destination:
    server: https://kubernetes.default.svc
    namespace: team-a
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
