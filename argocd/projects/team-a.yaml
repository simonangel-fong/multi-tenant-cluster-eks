apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: team-a
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: team-a workload
  sourceRepos:
    - https://github.com/simonangel-fong/eks-multi-tenant-cluster
  destinations:
    - server: https://kubernetes.default.svc
      namespace: team-a
  clusterResourceWhitelist:
    - group: gateway.networking.k8s.io
      kind: '*'
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
