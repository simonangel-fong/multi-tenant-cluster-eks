apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 01-init
  namespace: argocd
  labels:
    scope: platform
    capability: bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "-100"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: default
  description: 
  source:
    repoURL: https://github.com/simonangel-fong/eks-multi-tenant-cluster
    targetRevision: master
    path: argocd/init
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
