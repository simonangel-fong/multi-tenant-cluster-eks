apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-12"
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: platform
  source:
    repoURL: https://github.com/simonangel-fong/project-eks-argocd
    targetRevision: master
    path: argocd/platform/kyverno-policies
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
