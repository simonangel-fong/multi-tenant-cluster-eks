apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3-iops
provisioner: ebs.csi.aws.com
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  type: gp3
  iops: "10000"
  throughput: "500"
  tagSpecification_1: "Name={{ .PVCNamespace }}-{{ .PVCName }}"
  tagSpecification_2: "Namespace={{ .PVCNamespace }}"
  tagSpecification_3: "PVCName={{ .PVCName }}"
  tagSpecification_4: "PVName={{ .PVName }}"
  tagSpecification_5: "StorageClass=gp3-iops"
  tagSpecification_6: "Cluster=multi-tenant-eks-dev"
  tagSpecification_7: "ManagedBy=ebs-csi-driver"
