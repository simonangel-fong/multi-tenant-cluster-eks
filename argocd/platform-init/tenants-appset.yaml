apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/simonangel-fong/eks-multi-tenant-cluster
        revision: master
        files:
          - path: tenants/*.json
  template:
    metadata:
      name: "tenant-{{ .name }}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "100"
      labels:
        scope: tenant
        team: "{{ .name }}"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/simonangel-fong/eks-multi-tenant-cluster
          targetRevision: master
          path: tenant-chart
          helm:
            releaseName: "tenant-{{ .name }}"
            valuesObject:
              name: "{{ .name }}"
              sourceRepo: "{{ .sourceRepo }}"
        - repoURL: "{{ .sourceRepo }}"
          targetRevision: master
          path: "{{ .manifestPath }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .name }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=false
