apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenants
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/simonangel-fong/eks-multi-tenant-cluster
        revision: master
        files:
          - path: tenants/*.json
  template:
    metadata:
      name: "tenant-{{ .name }}-init"
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "100"
      labels:
        scope: tenant
        team: "{{ .name }}"
    spec:
      project: default
      source:
        repoURL: https://github.com/simonangel-fong/eks-multi-tenant-cluster
        targetRevision: master
        path: tenant-chart
        helm:
          releaseName: "tenant-{{ .name }}-init"
          valuesObject:
            name: "{{ .name }}"
            sourceRepo: "{{ .sourceRepo }}"
            manifestPath: "{{ .manifestPath }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - CreateNamespace=false
