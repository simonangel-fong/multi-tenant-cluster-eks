{{- if or .Values.tests.smoke.enabled .Values.tests.smokeExternal.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "voting-app.api.fullname" . }}-k6-scripts
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
data:
  smoke.js: |
    import http from 'k6/http';
    import { check, fail } from 'k6';

    const BASE = __ENV.TARGET_URL;

    export const options = {
      vus: 1,
      iterations: 1,
      thresholds: {
        checks: ['rate==1.0'],
        http_req_failed: ['rate<0.01'],
        http_req_duration: ['p(95)<1000'],
      },
    };

    export default function () {
      const healthz = http.get(`${BASE}/healthz`);
      check(healthz, { 'healthz 200': (r) => r.status === 200 }) || fail('healthz failed');

      const readyz = http.get(`${BASE}/readyz`);
      check(readyz, { 'readyz 200': (r) => r.status === 200 }) || fail('readyz failed');

      const polls = http.get(`${BASE}/polls`);
      const pollsOk = check(polls, {
        'polls 200': (r) => r.status === 200,
        'polls has >=2 items': (r) => {
          try { return r.json().length >= 2; } catch { return false; }
        },
      });
      if (!pollsOk) fail('polls list failed');

      const poll1 = http.get(`${BASE}/polls/1`);
      check(poll1, {
        'poll 1 200': (r) => r.status === 200,
        'poll 1 title matches': (r) => {
          try { return r.json().title === 'Favorite programming language?'; } catch { return false; }
        },
      }) || fail('poll 1 fetch failed');

      const vote = http.post(
        `${BASE}/polls/1/vote`,
        JSON.stringify({ option_id: 1 }),
        {
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': `smoke-${Date.now()}`,
          },
        },
      );
      check(vote, { 'vote 2xx': (r) => r.status >= 200 && r.status < 300 })
        || fail(`vote failed status=${vote.status} body=${vote.body}`);

      const results = http.get(`${BASE}/polls/1/results`);
      check(results, {
        'results 200': (r) => r.status === 200,
        'results has tallies': (r) => {
          try { return Array.isArray(r.json().tallies) && r.json().tallies.length > 0; } catch { return false; }
        },
      }) || fail('results failed');
    }
{{- end }}
