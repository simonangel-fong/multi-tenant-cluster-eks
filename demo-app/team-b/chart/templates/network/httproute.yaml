{{- if .Values.gatewayApi.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: todo-api
  labels:
    {{- include "todo.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gatewayApi.parentRef.name }}
      namespace: {{ .Values.gatewayApi.parentRef.namespace }}
      sectionName: {{ .Values.gatewayApi.parentRef.sectionName | quote }}
  hostnames:
    - {{ .Values.global.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - group: ""
          kind: Service
          name: todo-api
          port: 80
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: todo-web
  labels:
    {{- include "todo.commonLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gatewayApi.parentRef.name }}
      namespace: {{ .Values.gatewayApi.parentRef.namespace }}
      sectionName: {{ .Values.gatewayApi.parentRef.sectionName | quote }}
  hostnames:
    - {{ .Values.global.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: todo-web
          port: 80
          weight: 1
{{- end }}
