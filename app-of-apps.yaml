apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 00-root
  namespace: argocd
  labels:
    scope: platform
    capability: bootstrap
  finalizers:
    - argocd.argoproj.io/resources-finalizer
spec:
  project: default
  source:
    repoURL: https://github.com/simonangel-fong/eks-multi-tenant-cluster
    targetRevision: master
    path: argocd/bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
